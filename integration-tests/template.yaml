AWSTemplateFormatVersion: '2010-09-09'
Description: >
  cfn-drift-extended integration test stack.
  Deploys IAM roles with known policy configurations for drift testing.

Resources:
  # Scenario 1 & 2: Role with one inline policy and one managed policy.
  # We'll add extra policies outside CFN to test detection.
  BasicLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: drift-test-basic-lambda
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/drift-test-*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # Scenario 3: Role with inline policy that will be modified.
  ProcessorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: drift-test-processor
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SQSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                Resource: !Sub 'arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:drift-test-queue'

  # Scenario 4: CDK-style pattern with external AWS::IAM::Policy resource.
  # This should NOT be reported as drift.
  CdkStyleRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: drift-test-cdk-style
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole

  CdkStyleRoleDefaultPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: CdkStyleRoleDefaultPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: '*'
      Roles:
        - !Ref CdkStyleRole

  # Scenario 6: Role that will get multiple extra policies.
  MultiDriftRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: drift-test-multi-drift
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole

  # Scenario 7: Minimal role with no policies at all.
  BareRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: drift-test-bare
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole

Outputs:
  BasicLambdaRoleName:
    Value: !Ref BasicLambdaRole
  ProcessorRoleName:
    Value: !Ref ProcessorRole
  CdkStyleRoleName:
    Value: !Ref CdkStyleRole
  MultiDriftRoleName:
    Value: !Ref MultiDriftRole
  BareRoleName:
    Value: !Ref BareRole
